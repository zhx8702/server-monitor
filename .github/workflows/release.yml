name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-agent:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build agent binary
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PKG="github.com/server-monitor/agent/internal/version"

          go build -ldflags "-s -w \
            -X '${PKG}.Version=${VERSION}' \
            -X '${PKG}.Commit=${COMMIT}' \
            -X '${PKG}.BuildTime=${BUILD_TIME}'" \
            -o server-monitor-agent-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/agent

      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/server-monitor-agent-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build-agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/agent-linux-amd64/server-monitor-agent-linux-amd64 release/
          cp artifacts/agent-linux-arm64/server-monitor-agent-linux-arm64 release/
          cp agent/scripts/install.sh release/install.sh
          chmod +x release/server-monitor-agent-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/server-monitor-agent-linux-amd64
            release/server-monitor-agent-linux-arm64
            release/install.sh
