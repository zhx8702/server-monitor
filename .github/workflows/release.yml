name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-agent:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build agent binary
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PKG="github.com/server-monitor/agent/internal/version"

          go build -ldflags "-s -w \
            -X '${PKG}.Version=${VERSION}' \
            -X '${PKG}.Commit=${COMMIT}' \
            -X '${PKG}.BuildTime=${BUILD_TIME}'" \
            -o server-monitor-agent-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/agent

      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agent/server-monitor-agent-${{ matrix.goos }}-${{ matrix.goarch }}

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup Android project
        run: npx cap add android && npx cap sync android

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks

      - name: Inject signing config
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          GRADLE_FILE="android/app/build.gradle"

          # Inject signingConfigs block inside android { }
          sed -i '/^android {/a\
              signingConfigs {\
                  release {\
                      storeFile file("../keystore.jks")\
                      storePassword System.getenv("KEYSTORE_PASSWORD")\
                      keyAlias System.getenv("KEY_ALIAS")\
                      keyPassword System.getenv("KEY_PASSWORD")\
                  }\
              }' "$GRADLE_FILE"

          # Add signingConfig to release buildType
          sed -i '/buildTypes {/,/}/ { /release {/a\
                      signingConfig signingConfigs.release
          }' "$GRADLE_FILE"

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: android
        run: |
          if [ -f "keystore.jks" ]; then
            ./gradlew assembleRelease
          else
            echo "No keystore found, building debug APK"
            ./gradlew assembleDebug
          fi

      - name: Rename APK
        run: |
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk server-monitor-${GITHUB_REF_NAME}.apk
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk server-monitor-${GITHUB_REF_NAME}.apk
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: server-monitor-*.apk

  release:
    needs: [build-agent, build-apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/agent-linux-amd64/server-monitor-agent-linux-amd64 release/
          cp artifacts/agent-linux-arm64/server-monitor-agent-linux-arm64 release/
          cp artifacts/apk/server-monitor-*.apk release/
          cp agent/scripts/install.sh release/install.sh
          chmod +x release/server-monitor-agent-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/server-monitor-agent-linux-amd64
            release/server-monitor-agent-linux-arm64
            release/server-monitor-*.apk
            release/install.sh
