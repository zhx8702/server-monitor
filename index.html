<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0f14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>ServerMonitor</title>
    <script>
      ;(function() {
        var t = localStorage.getItem('theme')
        var dark = t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
        document.querySelector('meta[name="theme-color"]').content = dark ? '#0c0f14' : '#ffffff'

        // Capacitor: 覆盖安装 APK 后旧 SW 缓存的文件名与新版不匹配，导致动态 import 失败
        // 必须在 module script 加载前清理，否则来不及
        if (window.Capacitor && 'serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            if (regs.length > 0) {
              regs.forEach(function(r) { r.unregister() })
              caches.keys().then(function(keys) {
                Promise.all(keys.map(function(k) { return caches.delete(k) })).then(function() {
                  location.reload()
                })
              })
            }
          })
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
